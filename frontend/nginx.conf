# Serves the built SPA and proxies /api to the Django (gunicorn) service, so the
# browser talks to a single origin (no CORS needed).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API -> backend container.
    location /api/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health probe + Django admin + static (served by WhiteNoise on the backend).
    location /healthz/ { proxy_pass http://web:8000; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /admin/ { proxy_pass http://web:8000; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /static/ { proxy_pass http://web:8000; }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
